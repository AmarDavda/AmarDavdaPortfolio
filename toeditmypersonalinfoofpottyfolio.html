<!DOCTYPE html>
<html>
<head>
  <title>Edit Portfolio</title>
  <link rel="stylesheet" href="css/editStyle.css">
</head>
<body>

<h1>Edit Portfolio</h1>

<!-- HERO -->
<div class="section">
  <h2>Hero</h2>
  <div class="form-grid">
    <input type="text" id="hero-name" placeholder="Name">
    <input type="text" id="hero-title" placeholder="Title">
    <input type="text" id="hero-city" placeholder="City">
    <textarea id="hero-summary" placeholder="Summary"></textarea>
    <input type="text" id="hero-profileImage" placeholder="Profile Image Path">
    <input type="text" id="hero-logo" placeholder="Logo Path">
  </div>
</div>

<!-- EDUCATION -->
<div class="section">
  <h2>Education</h2>
  <div id="education-container" class="card-container"></div>
  <button class="add-btn" onclick="addEducation()">Add Education</button>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About</h2>
  <div class="form-grid">
    <input type="text" id="about-image" placeholder="Profile Image 2">
    <textarea id="about-summary" placeholder="Professional Summary"></textarea>
    <input type="text" id="about-resume" placeholder="Resume Path">
  </div>
</div>

<!-- ABOUT 2 -->
<div class="section">
  <h2>About 2</h2>
  <div class="form-grid">
    <input type="text" id="about2-image" placeholder="About Image">
    <textarea id="about2-summary" placeholder="Summary"></textarea>
    <textarea id="about2-why" placeholder="Why Work With Me"></textarea>
  </div>
</div>

<!-- CERTIFICATIONS -->
<div class="section">
  <h2>Certifications</h2>
  <div id="certifications-container" class="card-container"></div>
  <button class="add-btn" onclick="addCertification()">Add Certification</button>
</div>

<!-- EXPERIENCE -->
<div class="section">
  <h2>Experience</h2>
  <div id="experience-container" class="card-container"></div>
  <button class="add-btn" onclick="addExperience()">Add Experience</button>
</div>

<!-- PROJECTS -->
<div class="section">
  <h2>Projects</h2>
  <div id="projects-container" class="card-container"></div>
  <button class="add-btn" onclick="addProject()">Add Project</button>
</div>

<!-- SKILLS -->
<div class="section">
  <h2>Skills</h2>
  <div class="form-grid">
    <textarea id="skills-intro" placeholder="Skills Intro"></textarea>
  </div>
  <div id="skills-container" class="card-container"></div>
  <button class="add-btn" onclick="addCategory()">Add Category</button>
</div>

<!-- ADDITIONAL INFO -->
<div class="section">
  <h2>Additional Info</h2>
  <div class="form-grid">
    <input type="text" id="dob" placeholder="Date of Birth">
    <input type="text" id="native" placeholder="Native">
    <input type="text" id="citizenship" placeholder="Citizenship">
    <input type="text" id="maritalStatus" placeholder="Marital Status">
  </div>
</div>

<!-- LANGUAGES -->
<div class="section">
  <h2>Languages</h2>
  <div class="form-grid">
    <input type="text" id="lang-title" placeholder="Title">
    <input type="text" id="lang-intro" placeholder="Intro">
  </div>
  <div id="languages-container" class="card-container"></div>
  <button class="add-btn" onclick="addLanguage()">Add Language</button>
</div>

<!-- INTEREST AREAS -->
<div class="section">
  <h2>Interest Areas</h2>
  <div class="form-grid">
    <input type="text" id="interest-title" placeholder="Title">
    <input type="text" id="interest-intro" placeholder="Intro">
  </div>
  <div id="interest-container" class="card-container"></div>
  <button class="add-btn" onclick="addInterest()">Add Interest</button>
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact</h2>
  <div class="form-grid">
    <input type="text" id="contact-title" placeholder="Title">
    <input type="text" id="contact-img" placeholder="Contact Image">
    <textarea id="contact-para1" placeholder="Paragraph 1"></textarea>
    <textarea id="contact-para2" placeholder="Paragraph 2"></textarea>
    <textarea id="contact-para3" placeholder="Paragraph 3"></textarea>
  </div>

  <h3>Contact Items</h3>
  <div id="contact-container" class="card-container"></div>
  <button class="add-btn" onclick="addContactItem()">Add Contact Item</button>
</div>

<!-- SAVE -->
<div class="save-wrapper">
  <button class="save-btn" onclick="downloadJSON()">Save & Download</button>
</div>

<script src="js/script.js" defer></script>
</body>
</html>
